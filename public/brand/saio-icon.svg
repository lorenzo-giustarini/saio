<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="SAIO icon — Neural Nexus">
  <defs>
    <linearGradient id="saio-nn-stroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <radialGradient id="saio-nn-core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="35%" stop-color="#f5f3ff"/>
      <stop offset="75%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.6"/>
    </radialGradient>
    <filter id="saio-nn-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 6 curved neural "arms" forming hexagonal brain-circuit pattern.
       Each arm is a rounded J-shape curving toward the center. -->
  <g fill="none" stroke="url(#saio-nn-stroke)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
    <!-- Top arm -->
    <path d="M 35 14 L 35 32 Q 35 40 43 40 L 50 40"/>
    <path d="M 65 14 L 65 32 Q 65 40 57 40 L 50 40"/>
    <!-- Right arms -->
    <path d="M 86 35 L 68 35 Q 60 35 60 43 L 60 50"/>
    <path d="M 86 65 L 68 65 Q 60 65 60 57 L 60 50"/>
    <!-- Bottom arms -->
    <path d="M 65 86 L 65 68 Q 65 60 57 60 L 50 60"/>
    <path d="M 35 86 L 35 68 Q 35 60 43 60 L 50 60"/>
    <!-- Left arms -->
    <path d="M 14 65 L 32 65 Q 40 65 40 57 L 40 50"/>
    <path d="M 14 35 L 32 35 Q 40 35 40 43 L 40 50"/>
  </g>

  <!-- Central glowing core -->
  <g filter="url(#saio-nn-glow)">
    <circle cx="50" cy="50" r="8" fill="url(#saio-nn-core)"/>
    <circle cx="50" cy="50" r="3" fill="#ffffff"/>
  </g>
</svg>
