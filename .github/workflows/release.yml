name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install npm dependencies
        run: npm install --ignore-scripts

      - name: Build sidecar
        run: npm run sidecar:bundle

      - name: Build Tauri app + create GitHub Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'SAIO ${{ github.ref_name }}'
          releaseBody: |
            **SAIO Smart AI Office** — cross-platform desktop app via Tauri 2.

            See `CHANGELOG.md` for changes.

            ## Download

            - **Windows**: `SAIO_${{ github.ref_name }}_x64-setup.exe`
            - **macOS Apple Silicon**: `SAIO_${{ github.ref_name }}_aarch64.dmg`
            - **macOS Intel**: `SAIO_${{ github.ref_name }}_x64.dmg`
            - **Linux .deb**: `saio_${{ github.ref_name }}_amd64.deb`
            - **Linux AppImage**: `saio_${{ github.ref_name }}_amd64.AppImage`
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
